<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronograma CFOIP 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111214;
      --surface:  #18191d;
      --card:     #1e2024;
      --border:   #2a2c32;
      --orange:   #f97316;
      --orange-d: #c2580e;
      --orange-s: rgba(249,115,22,0.12);
      --white:    #f5f5f5;
      --muted:    #6b7280;
      --text:     #d1d5db;
      --r:        8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      text-align: center;
    }

    /* ── NAV ─────────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px; height: 44px;
      border-radius: var(--r);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { background: var(--orange-s); border-color: var(--orange); color: var(--orange); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .date-pill {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      height: 44px;
      padding: 0 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .date-pill:hover { border-color: var(--orange); }

    .pill-left { display: flex; align-items: center; gap: 8px; }

    .pill-weekday {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--orange);
    }

    .pill-date {
      font-size: 14px;
      font-weight: 700;
      color: var(--white);
    }

    .pill-icon { color: var(--muted); font-size: 12px; }

    .today-btn {
      background: var(--orange);
      border: none;
      color: #fff;
      padding: 0 14px;
      height: 44px;
      border-radius: var(--r);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .today-btn:hover { background: var(--orange-d); }

    /* ── TABLE ───────────────────────────────── */
    .table-wrap {
      margin: 8px 16px 24px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; word-break: break-word; }

    thead th {
      background: var(--card);
      padding: 7px 12px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    thead th:last-child { border-right: none; text-align: center; }
    thead th:nth-child(1) { width: 96px; }
    thead th:nth-child(3) { width: 70px; }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr.normal:hover { background: rgba(255,255,255,0.02); }

    td { padding: 9px 12px; vertical-align: middle; border-right: 1px solid rgba(255,255,255,0.04); }
    td:last-child { border-right: none; }

    /* Row types */
    tr.intervalo { opacity: 0.45; }
    tr.reposicao { opacity: 0.55; }
    tr.especial  { background: rgba(249,115,22,0.06); }
    tr.current   {
      background: rgba(249,115,22,0.10);
      box-shadow: inset 3px 0 0 var(--orange);
    }

    tr.current {
      animation: currentPulse 2s infinite;
    }

    @keyframes currentPulse {
      0%, 100% {
        background: rgba(249,115,22,0.08);
        box-shadow: inset 3px 0 0 var(--orange);
      }

      50% {
        background: rgba(249,115,22,0.22);
        box-shadow: inset 3px 0 0 #ffb366;
      }
    }

    .horario {
      font-size: 10px;
      font-weight: 600;
      color: var(--orange);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    tr.intervalo .horario,
    tr.reposicao .horario { color: var(--muted); }

    .disciplina {
      font-size: 13px;
      font-weight: 500;
      color: var(--white);
      line-height: 1.3;
    }
    tr.intervalo .disciplina,
    tr.reposicao .disciplina { color: var(--muted); font-weight: 400; }
    tr.especial .disciplina  { color: var(--orange); }

    .prof {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .aula-badge {
      display: inline-block;
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.2);
      color: var(--orange);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    tr.especial .aula-badge { display: none; }

    /* ── NO DATA ─────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 16px;
      color: var(--muted);
    }

    /* ── MODAL ───────────────────────────────── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px 12px 0 0;
      padding: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 60vh;
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .modal-head h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
    }

    .modal-close-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
      overflow-y: auto;
    }
    .days-grid::-webkit-scrollbar { width: 3px; }
    .days-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .day-opt {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .day-opt:hover { border-color: var(--orange); background: var(--orange-s); }
    .day-opt.active { border-color: var(--orange); background: var(--orange-s); }

    .day-opt-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--white);
    }
    .day-opt-name {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    @media (max-width: 480px) {
      .table-wrap { margin: 8px 8px 24px; }
      thead th { padding: 6px 8px; font-size: 9px; }
      td { padding: 8px 8px; }
      .horario { font-size: 10px; }
      .disciplina { font-size: 12px; word-break: break-word; }
      .prof { font-size: 10px; word-break: break-word; }
      .aula-badge { font-size: 10px; padding: 2px 5px; }
      td:last-child { width: 60px; }
      thead th:nth-child(1) { width: 82px; }
    }

    @media (max-width: 360px) {
      thead th:last-child, td:last-child { display: none; }
      thead th:nth-child(1) { width: 76px; }
      .horario { font-size: 9px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">Grupo Sertão &middot; G19</div>
</header>

<div class="nav">
  <button class="nav-btn" id="btnPrev">&#8592;</button>
  <div class="date-pill" onclick="openModal()">
    <div class="pill-left">
      <span class="pill-weekday" id="dayName">—</span>
      <span class="pill-date" id="dateMain">—</span>
    </div>
    <span class="pill-icon">&#9660;</span>
  </div>
  <button class="nav-btn" id="btnNext">&#8594;</button>
  <button class="today-btn" onclick="goToday()">Hoje</button>
</div>

<div id="content"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOut(event)">
  <div class="modal">
    <div class="modal-head">
      <h3>Selecionar dia</h3>
      <button class="modal-close-btn" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
</div>

<script>
const SCHEDULE_URL = 'schedule.json';
let data = null, dates = [], idx = 0;

async function init() {
  try {
    const r = await fetch(SCHEDULE_URL);
    if (!r.ok) throw 0;
    data = await r.json();
    dates = Object.keys(data.dias).sort();
    buildModal();
    const today = todayKey();
    const i = dates.indexOf(today);
    idx = i >= 0 ? i : nearest(today);
    render();
  } catch {
    document.getElementById('content').innerHTML =
      '<div class="empty">Erro ao carregar schedule.json.<br>Verifique se o arquivo está na mesma pasta.</div>';
  }
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function nearest(t) {
  for (let i = 0; i < dates.length; i++) if (dates[i] >= t) return i;
  return dates.length - 1;
}

function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }

function isCurrent(horario, nowMin) {
  const [s,e] = horario.split(' - ');
  return nowMin >= toMin(s) && nowMin < toMin(e);
}

function render() {
  const key = dates[idx];
  const dia = data.dias[key];
  const today = todayKey();
  const isToday = key === today;
  const [y,m,d] = key.split('-');

  document.getElementById('dayName').textContent = dia.diaSemana;
  document.getElementById('dateMain').textContent = `${d}/${m}/${y}`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === dates.length - 1;

  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();


  const rows = dia.aulas.map(aula => {
    const isInt = aula.disciplina === 'INTERVALO';
    const isRep = aula.disciplina === 'Reposição de Aula';
    const isEsp = aula.disciplina.includes('Aniversário');
    const isCur = isToday && isCurrent(aula.horario, nowMin);

    let cls = 'normal';
    if (isCur)       cls = 'current';
    else if (isInt)  cls = 'intervalo';
    else if (isEsp)  cls = 'especial';
    else if (isRep)  cls = 'reposicao';

    let badgeHtml = '';
    if (!isInt && !isRep && !isEsp && aula.sessao) {
      badgeHtml = `<span class="aula-badge">${aula.sessao}</span>`;
    }

    const profHtml = aula.professor ? `<div class="prof">${aula.professor}</div>` : '';

    return `<tr class="${cls}">
      <td><span class="horario">${aula.horario}</span></td>
      <td>
        <div class="disciplina">${aula.disciplina}</div>
        ${profHtml}
      </td>
      <td style="text-align:center">${badgeHtml}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Horário</th>
            <th>Disciplina</th>
            <th>Aula</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  document.querySelectorAll('.day-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });

  if (isToday) {
    setTimeout(() => {
      const cur = document.querySelector('.current');
      if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 80);
  }
}

document.getElementById('btnPrev').onclick = () => { if (idx > 0) { idx--; render(); } };
document.getElementById('btnNext').onclick = () => { if (idx < dates.length-1) { idx++; render(); } };

function goToday() {
  const t = todayKey();
  const i = dates.indexOf(t);
  if (i >= 0) { idx = i; render(); }
  else alert('O dia de hoje não está no cronograma.');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') document.getElementById('btnPrev').click();
  if (e.key === 'ArrowRight') document.getElementById('btnNext').click();
});

function buildModal() {
  document.getElementById('daysGrid').innerHTML = dates.map((k, i) => {
    const [y,m,d] = k.split('-');
    return `<div class="day-opt" data-key="${k}" onclick="pick(${i})">
      <div class="day-opt-date">${d}/${m}</div>
      <div class="day-opt-name">${data.dias[k].diaSemana}</div>
    </div>`;
  }).join('');
}

function pick(i) { idx = i; render(); closeModal(); }
function openModal() { document.getElementById('overlay').classList.add('open'); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeOut(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

init();
</script>
</body>
</html>
