<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronograma CFOIP 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --border: #1f2430;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --gold: #f5c542;
      --text: #e8eaf0;
      --muted: #7a8099;
      --intervalo: #1a1d26;
      --reposicao: #13151e;
      --especial: #1a1226;
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0d0f14 0%, #131829 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 20px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    h1 span { color: var(--accent); }

    /* NAV */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 16px 0;
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px;
      height: 44px;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: scale(1.05);
    }

    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .date-display {
      flex: 1;
      max-width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s;
    }

    .date-display:hover { border-color: var(--accent); }

    .date-day-name {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .date-main {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }

    .today-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    .today-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    /* DATE PICKER MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: min(360px, 92vw);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
    }

    .days-grid::-webkit-scrollbar { width: 4px; }
    .days-grid::-webkit-scrollbar-track { background: transparent; }
    .days-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .day-option {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .day-option:hover { border-color: var(--accent); background: #151d2e; }
    .day-option.active { border-color: var(--accent); background: #0f1e3a; }

    .day-option-date {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
    }

    .day-option-name {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .modal-close {
      margin-top: 16px;
      width: 100%;
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-close:hover { background: #2a2f3f; }

    /* STATUS BANNER */
    .status-banner {
      margin: 16px 16px 0;
      background: linear-gradient(90deg, rgba(79,142,247,0.12), rgba(124,58,237,0.08));
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .status-text {
      font-size: 13px;
      color: var(--muted);
    }

    .status-text strong { color: var(--accent); }

    /* NO DATA */
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-data .icon { font-size: 48px; margin-bottom: 12px; }
    .no-data p { font-size: 15px; }

    /* TABLE */
    .table-wrap {
      margin: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #1a1e2e;
      padding: 12px 16px;
      text-align: left;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    thead th:last-child { text-align: center; }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }

    tbody tr.row-intervalo { background: var(--intervalo); opacity: 0.7; }
    tbody tr.row-reposicao { background: var(--reposicao); }
    tbody tr.row-especial { background: var(--especial); }
    tbody tr.row-normal:hover { background: #1c2133; }

    tbody tr.row-current {
      background: rgba(79,142,247,0.08);
      border-left: 3px solid var(--accent);
    }

    td {
      padding: 13px 16px;
      vertical-align: middle;
    }

    .horario {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .row-intervalo .horario { color: var(--muted); }

    .disciplina {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }

    .row-intervalo .disciplina {
      color: var(--muted);
      font-style: italic;
      font-size: 13px;
    }

    .row-especial .disciplina { color: var(--gold); }

    .professor {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .sessao-badge {
      display: inline-block;
      background: rgba(79,142,247,0.15);
      border: 1px solid rgba(79,142,247,0.25);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      text-align: center;
      white-space: nowrap;
    }

    .row-especial .sessao-badge {
      background: rgba(245,197,66,0.1);
      border-color: rgba(245,197,66,0.3);
      color: var(--gold);
    }

    /* FOOTER */
    footer {
      text-align: center;
      margin-top: 32px;
      padding: 0 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    /* RESPONSIVE */
    @media (max-width: 500px) {
      thead th:last-child, td:last-child { display: none; }
      .professor { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="badge">AESP · Grupo 19 · 2026</div>
  <h1>CFOIP — <span>Cronograma Mensal</span></h1>
</header>

<div class="nav-bar">
  <button class="nav-btn" id="btnPrev" title="Dia anterior">&#8592;</button>
  <div class="date-display" id="dateDisplay" onclick="openModal()">
    <div class="date-day-name" id="dayName">—</div>
    <div class="date-main" id="dateMain">—</div>
  </div>
  <button class="nav-btn" id="btnNext" title="Próximo dia">&#8594;</button>
  <button class="today-btn" onclick="goToday()">Hoje</button>
</div>

<div class="status-banner" id="statusBanner" style="display:none">
  <div class="status-dot"></div>
  <div class="status-text" id="statusText"></div>
</div>

<div id="content"></div>

<footer>
  Academia Estadual de Segurança Pública do Ceará — AESP/CE<br>
  Av. Presidente Costa e Silva, 1251 · Mondubim · Fortaleza, CE
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3>📅 Selecionar dia</h3>
    <div class="days-grid" id="daysGrid"></div>
    <button class="modal-close" onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
  // ── DATA ──────────────────────────────────────────────────────────────────
  const SCHEDULE_URL = 'schedule.json';
  let scheduleData = null;
  let sortedDates = [];
  let currentIndex = 0;

  // ── LOAD ──────────────────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch(SCHEDULE_URL);
      if (!res.ok) throw new Error('Falha ao carregar schedule.json');
      scheduleData = await res.json();
      sortedDates = Object.keys(scheduleData.dias).sort();
      buildModal();
      const todayKey = getTodayKey();
      const idx = sortedDates.indexOf(todayKey);
      currentIndex = idx >= 0 ? idx : findClosestIndex(todayKey);
      render();
    } catch (e) {
      document.getElementById('content').innerHTML =
        `<div class="no-data"><div class="icon">⚠️</div><p>Erro ao carregar o cronograma.<br>Verifique se o arquivo <strong>schedule.json</strong> está na mesma pasta.</p></div>`;
    }
  }

  function getTodayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function findClosestIndex(todayKey) {
    for (let i = 0; i < sortedDates.length; i++) {
      if (sortedDates[i] >= todayKey) return i;
    }
    return sortedDates.length - 1;
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function render() {
    const key = sortedDates[currentIndex];
    const dia = scheduleData.dias[key];
    const todayKey = getTodayKey();
    const isToday = key === todayKey;

    // header date
    const [y, m, d] = key.split('-');
    document.getElementById('dayName').textContent = dia.diaSemana;
    document.getElementById('dateMain').textContent = `${d}/${m}/${y}`;

    // status
    const banner = document.getElementById('statusBanner');
    const statusText = document.getElementById('statusText');
    if (isToday) {
      banner.style.display = 'flex';
      const aula = getCurrentAula(dia.aulas);
      statusText.innerHTML = aula
        ? `Agora: <strong>${aula.disciplina}</strong> (${aula.horario})`
        : `<strong>Hoje</strong> — sem aula em andamento no momento.`;
    } else {
      banner.style.display = 'none';
    }

    // navigation
    document.getElementById('btnPrev').disabled = currentIndex === 0;
    document.getElementById('btnNext').disabled = currentIndex === sortedDates.length - 1;

    // table
    const now = new Date();
    const nowMinutes = now.getHours() * 60 + now.getMinutes();

    const rows = dia.aulas.map(aula => {
      const isIntervalo = aula.disciplina === 'INTERVALO';
      const isReposicao = aula.disciplina === 'Reposição de Aula';
      const isEspecial = aula.disciplina.includes('Aniversário');
      const isCurrent = isToday && isCurrentSlot(aula.horario, nowMinutes);

      let rowClass = 'row-normal';
      if (isCurrent) rowClass = 'row-current';
      else if (isIntervalo) rowClass = 'row-intervalo';
      else if (isEspecial) rowClass = 'row-especial';
      else if (isReposicao) rowClass = 'row-reposicao';

      const sessaoHtml = aula.sessao
        ? `<span class="sessao-badge">${aula.sessao}</span>`
        : '';
      const profHtml = aula.professor
        ? `<div class="professor">👤 ${aula.professor}</div>`
        : '';

      return `<tr class="${rowClass}">
        <td><span class="horario">${aula.horario}</span></td>
        <td>
          <div class="disciplina">${aula.disciplina}</div>
          ${profHtml}
        </td>
        <td style="text-align:center">${sessaoHtml}</td>
      </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Horário</th>
              <th>Disciplina</th>
              <th>Sessão</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    // highlight modal
    document.querySelectorAll('.day-option').forEach(el => {
      el.classList.toggle('active', el.dataset.key === key);
    });

    // scroll to current row
    if (isToday) {
      setTimeout(() => {
        const cur = document.querySelector('.row-current');
        if (cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  }

  function isCurrentSlot(horario, nowMinutes) {
    const [start, end] = horario.split(' - ');
    const toMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
    return nowMinutes >= toMin(start) && nowMinutes < toMin(end);
  }

  function getCurrentAula(aulas) {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    return aulas.find(a => isCurrentSlot(a.horario, nowMin)) || null;
  }

  // ── NAVIGATION ────────────────────────────────────────────────────────────
  document.getElementById('btnPrev').onclick = () => { if (currentIndex > 0) { currentIndex--; render(); } };
  document.getElementById('btnNext').onclick = () => { if (currentIndex < sortedDates.length-1) { currentIndex++; render(); } };

  function goToday() {
    const todayKey = getTodayKey();
    const idx = sortedDates.indexOf(todayKey);
    if (idx >= 0) { currentIndex = idx; render(); }
    else alert('O dia de hoje não está no cronograma.');
  }

  // keyboard arrows
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') document.getElementById('btnPrev').click();
    if (e.key === 'ArrowRight') document.getElementById('btnNext').click();
  });

  // ── MODAL ─────────────────────────────────────────────────────────────────
  function buildModal() {
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = sortedDates.map((key, i) => {
      const dia = scheduleData.dias[key];
      const [y,m,d] = key.split('-');
      return `<div class="day-option" data-key="${key}" data-index="${i}" onclick="selectDay(${i})">
        <div class="day-option-date">${d}/${m}</div>
        <div class="day-option-name">${dia.diaSemana}</div>
      </div>`;
    }).join('');
  }

  function selectDay(i) { currentIndex = i; render(); closeModal(); }
  function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

  // ── START ─────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
